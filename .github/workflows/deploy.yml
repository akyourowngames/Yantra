name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm run lint
      - run: npm test

  deploy-db:
    name: Sync Database Schema
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase CI configuration
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing SUPABASE_PROJECT_REF secret for the selected GitHub environment."
            exit 1
          fi

          if ! echo "$SUPABASE_PROJECT_REF" | grep -Eq '^[a-z0-9]{20}$'; then
            echo "::error::SUPABASE_PROJECT_REF must be the 20-character Supabase project ref, not the full Supabase URL."
            exit 1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing SUPABASE_DB_PASSWORD secret for the selected GitHub environment."
            exit 1
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN secret for the selected GitHub environment."
            exit 1
          fi

      - name: Link project
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"

      - name: Push Database Schema
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Log Deployment
        run: echo "Database schema successfully synced to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }} environment."
